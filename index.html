<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Function Guesser</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231b2428'/%3E%3Ctext x='32' y='39' font-size='26' text-anchor='middle' fill='white' font-family='Arial'%3Ef?%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.desmos.com/api/v1.11/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6"></script>
    <script defer src="crypto.js"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <section class="actionbar creator-actionbar" id="creatorActions" aria-label="Creator controls">
        <button class="button primary floating-export" id="exportButton" type="button">Export Link</button>
        <p class="status" id="creatorStatus" role="status"></p>
      </section>

      <section class="actionbar" id="playerActions" aria-label="Player status" hidden>
        <p class="puzzle-meta" id="puzzleName">Puzzle</p>
        <p class="status" id="playerStatus" role="status"></p>
      </section>

      <main class="main-stage">
        <section class="view is-active" id="creatorView" aria-label="Creator graph">
          <div class="calculator" id="creatorCalculator"></div>
        </section>

        <section class="view" id="playerView" aria-label="Player graph">
          <div class="calculator" id="playerCalculator"></div>
        </section>
      </main>
    </div>

    <div class="overlay" id="nameOverlay" hidden>
      <section class="complete-dialog name-dialog" role="dialog" aria-modal="true" aria-labelledby="nameTitle">
        <p class="eyebrow">Export Puzzle</p>
        <h1 id="nameTitle">Name Puzzle</h1>

        <form class="name-form" id="nameForm">
          <label class="field">
            <span>Puzzle Name</span>
            <input id="puzzleNameInput" type="text" maxlength="80" autocomplete="off">
          </label>

          <div class="button-row">
            <button class="button primary" type="submit">Copy Link</button>
            <button class="button secondary" id="cancelNameButton" type="button">Cancel</button>
          </div>
        </form>
      </section>
    </div>

    <div class="overlay" id="completeOverlay" hidden>
      <section class="complete-dialog" role="dialog" aria-modal="true" aria-labelledby="completeTitle">
        <p class="eyebrow">Puzzle Solved</p>
        <h1 id="completeTitle">Completed!</h1>

        <label class="check-row">
          <input id="includeSpoiler" type="checkbox">
          <span>Include solution spoiler</span>
        </label>

        <label class="field">
          <span>Discord Message</span>
          <textarea id="discordMessage" readonly rows="6"></textarea>
        </label>

        <div class="button-row">
          <button class="button primary" id="copyDiscordButton" type="button">Copy Discord Message</button>
          <button class="button secondary" id="closeOverlayButton" type="button">Keep Playing</button>
        </div>
      </section>
    </div>
  </body>
</html>
